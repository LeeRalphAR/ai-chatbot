<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-container { width: 420px; height: 600px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: #075e54; color: white; padding: 16px 20px; font-size: 18px; font-weight: bold; }
    .chat-header span { font-size: 13px; font-weight: normal; display: block; opacity: 0.8; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .message.user { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.bot { background: #f1f0f0; align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.typing { color: #888; font-style: italic; }
    .chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
    .chat-input input:focus { border-color: #075e54; }
    .chat-input button { background: #075e54; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; font-size: 18px; }
    .chat-input button:hover { background: #128c7e; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      AI Chatbot
      <span>Powered by LLaMA 3 via Groq</span>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message bot">Hi! I'm your AI assistant. How can I help you today?</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sessionId = 'user_' + Math.random().toString(36).substr(2, 9);

    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    function appendMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message');
      msg.classList.add(sender);
      msg.innerText = text;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return msg;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      appendMessage(message, 'user');
      userInput.value = '';

      const typing = appendMessage('Typing...', 'bot');

      try {
        const response = await fetch('http://127.0.0.1:8000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, message: message })
        });

        const data = await response.json();
        typing.remove();
        appendMessage(data.reply, 'bot');
      } catch (error) {
        typing.remove();
        appendMessage('Error: Could not connect to the server.', 'bot');
      }
    }
  </script>
</body>
</html>
